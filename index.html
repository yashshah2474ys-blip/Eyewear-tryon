<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Virtual Eyewear Try-On</title>

<!-- MediaPipe Face Mesh -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

<style>
  /* ─── Reset & Base ─── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1e1e2a;
    --accent: #c8a96e;
    --accent2: #e8c87a;
    --text: #f0ede8;
    --text-muted: #8a8790;
    --success: #6ecba0;
    --radius: 16px;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }

  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap');

  /* ─── Layout Shell ─── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    width: 100%;
    position: relative;
  }

  /* ─── Camera Viewport ─── */
  #viewport {
    position: relative;
    flex: 1;
    overflow: hidden;
    background: #000;
  }

  #inputVideo {
    position: absolute;
    width: 1px; height: 1px;
    opacity: 0;
    pointer-events: none;
  }

  #outputCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }

  /* ─── Header Overlay ─── */
  #header {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
    padding: 20px 20px 0;
    background: linear-gradient(to bottom, rgba(10,10,15,0.85) 0%, transparent 100%);
    pointer-events: none;
  }

  #header h1 {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--accent2);
  }

  #header p {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* ─── Status Badge ─── */
  #statusBadge {
    position: absolute;
    top: 16px; right: 16px;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(10,10,15,0.75);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(200,169,110,0.2);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 11px;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    transition: all 0.3s;
  }

  #statusDot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #555;
    transition: background 0.3s;
  }

  #statusBadge.detecting #statusDot { background: var(--accent); animation: pulse 1.5s infinite; }
  #statusBadge.tracked #statusDot { background: var(--success); }
  #statusBadge.error #statusDot { background: #e06060; }

  @keyframes pulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
  }

  /* ─── Recommendation Panel ─── */
  #recommendationPanel {
    position: absolute;
    bottom: 220px; left: 0; right: 0;
    z-index: 10;
    margin: 0 16px;
    padding: 12px 16px;
    background: rgba(10,10,15,0.80);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(200,169,110,0.18);
    border-radius: 12px;
    font-size: 12px;
    line-height: 1.5;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s, transform 0.4s;
    pointer-events: none;
  }

  #recommendationPanel.visible {
    opacity: 1;
    transform: translateY(0);
  }

  #recommendationPanel .rec-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    margin-bottom: 4px;
  }

  #recommendationPanel .rec-shape {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
  }

  #recommendationPanel .rec-frames {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* ─── Bottom Panel ─── */
  #bottomPanel {
    flex-shrink: 0;
    background: var(--surface);
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 14px 16px 20px;
    z-index: 20;
  }

  #bottomPanel .panel-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  /* ─── Frame Selector ─── */
  #frameSelector {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 4px;
    margin-bottom: 12px;
  }

  #frameSelector::-webkit-scrollbar { display: none; }

  .frame-btn {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1.5px solid transparent;
    border-radius: 12px;
    padding: 10px 14px 8px;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 72px;
    -webkit-tap-highlight-color: transparent;
  }

  .frame-btn:active { transform: scale(0.95); }

  .frame-btn.active {
    border-color: var(--accent);
    background: rgba(200,169,110,0.1);
  }

  .frame-btn canvas {
    width: 56px;
    height: 22px;
    display: block;
  }

  .frame-btn span {
    font-size: 10px;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .frame-btn.active span { color: var(--accent); }

  /* ─── Action Buttons ─── */
  #actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  #captureBtn {
    flex: 1;
    height: 44px;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 10px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  #captureBtn:active { transform: scale(0.97); background: var(--accent2); }

  #toggleLandmarks {
    width: 44px; height: 44px;
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  #toggleLandmarks:active { transform: scale(0.95); }
  #toggleLandmarks.active { background: rgba(200,169,110,0.15); border-color: var(--accent); }

  /* ─── Permission Screen ─── */
  #permScreen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 32px;
    text-align: center;
    gap: 16px;
  }

  #permScreen .icon { font-size: 52px; }

  #permScreen h2 {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 400;
    color: var(--accent2);
  }

  #permScreen p {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.6;
    max-width: 300px;
  }

  #permScreen .startBtn {
    margin-top: 8px;
    padding: 14px 36px;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 12px;
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.04em;
    -webkit-tap-highlight-color: transparent;
  }

  #permScreen.hidden { display: none; }

  /* ─── Loading Overlay ─── */
  #loadingOverlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 90;
    gap: 20px;
    transition: opacity 0.5s;
  }

  #loadingOverlay.hidden { opacity: 0; pointer-events: none; }

  .spinner {
    width: 40px; height: 40px;
    border: 2px solid rgba(200,169,110,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #loadingOverlay p {
    font-size: 13px;
    letter-spacing: 0.1em;
    color: var(--text-muted);
  }

  /* ─── Toast ─── */
  #toast {
    position: fixed;
    bottom: 240px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(30,30,40,0.95);
    border: 1px solid rgba(200,169,110,0.3);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    white-space: nowrap;
    pointer-events: none;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- Permission Screen -->
<div id="permScreen">
  <div class="icon">👓</div>
  <h2>Virtual Try-On</h2>
  <p>This app uses your front camera to detect your face and overlay eyewear frames in real time.</p>
  <button class="startBtn" onclick="startApp()">Enable Camera</button>
</div>

<!-- Loading Overlay -->
<div id="loadingOverlay">
  <div class="spinner"></div>
  <p>Loading face detection…</p>
</div>

<!-- Main App -->
<div id="app">
  <div id="viewport">
    <video id="inputVideo" playsinline muted autoplay></video>
    <canvas id="outputCanvas"></canvas>

    <div id="header">
      <h1>Eyewear Studio</h1>
      <p>Virtual Try-On</p>
    </div>

    <div id="statusBadge">
      <div id="statusDot"></div>
      <span id="statusText">Initializing…</span>
    </div>

    <div id="recommendationPanel">
      <div class="rec-label">Face Analysis</div>
      <div class="rec-shape" id="recShape">—</div>
      <div class="rec-frames" id="recFrames"></div>
    </div>
  </div>

  <div id="bottomPanel">
    <div class="panel-label">Choose Frame</div>
    <div id="frameSelector"></div>
    <div id="actions">
      <button id="captureBtn" onclick="capturePhoto()">📸 Capture Look</button>
      <button id="toggleLandmarks" title="Toggle landmarks" onclick="toggleDebug()">🎯</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════════
//  FRAME DEFINITIONS
//  Each frame has: id, name, style, color scheme, and a draw function
//  that renders the frame onto a canvas given normalized eye positions.
//  Using procedural SVG/Canvas drawing — fully self-contained, no
//  external image dependencies.
// ══════════════════════════════════════════════════════════════════

const FRAMES = [
  {
    id: 'classic-oval',
    name: 'Classic',
    subtitle: 'Oval',
    recommended: ['oval', 'heart', 'diamond'],
    draw: drawClassicOval,
    preview: drawClassicOvalPreview,
  },
  {
    id: 'wayfarer',
    name: 'Wayfarer',
    subtitle: 'Square',
    recommended: ['oval', 'round'],
    draw: drawWayfarer,
    preview: drawWayfarerPreview,
  },
  {
    id: 'cat-eye',
    name: 'Cat Eye',
    subtitle: 'Winged',
    recommended: ['round', 'square', 'heart'],
    draw: drawCatEye,
    preview: drawCatEyePreview,
  },
  {
    id: 'round-thin',
    name: 'Round',
    subtitle: 'Wire',
    recommended: ['square', 'diamond', 'oblong'],
    draw: drawRoundThin,
    preview: drawRoundThinPreview,
  },
  {
    id: 'aviator',
    name: 'Aviator',
    subtitle: 'Teardrop',
    recommended: ['oval', 'square', 'oblong'],
    draw: drawAviator,
    preview: drawAviatorPreview,
  },
];

// ── Frame render helpers ─────────────────────────────────────────
// Each draw(ctx, params) receives:
//   params: { cx, cy, lensW, lensH, eyeDist, angle, bridgeX, bridgeY, faceW }
//   cx/cy = midpoint of eyes  |  lensW = width of one lens  |  lensH = height
//   angle = tilt in radians   |  bridgeX/Y = nose bridge landmark

function drawClassicOval(ctx, p) {
  ctx.save();
  ctx.translate(p.cx, p.cy);
  ctx.rotate(p.angle);

  const lw = p.lensW * 0.92;
  const lh = p.lensH * 1.0;
  const gap = p.eyeDist * 0.10;
  const offsetX = p.eyeDist * 0.5 - lw * 0.5;

  ctx.lineWidth = Math.max(2, p.faceW * 0.012);
  ctx.strokeStyle = '#1a1008';

  // Lenses
  for (const side of [-1, 1]) {
    const x = side * (offsetX + lw * 0.5);
    ctx.beginPath();
    ctx.ellipse(x, 0, lw * 0.5, lh * 0.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(180,220,255,0.12)';
    ctx.fill();
    ctx.stroke();
  }

  // Bridge
  const bx = offsetX;
  ctx.beginPath();
  ctx.moveTo(-(bx), -lh * 0.06);
  ctx.quadraticCurveTo(0, lh * 0.22, bx, -lh * 0.06);
  ctx.stroke();

  // Temples (arms)
  const armY = 0;
  const armLen = p.faceW * 0.28;
  for (const side of [-1, 1]) {
    const startX = side * (offsetX + lw);
    ctx.beginPath();
    ctx.moveTo(startX, armY);
    ctx.lineTo(startX + side * armLen, armY + p.lensH * 0.15);
    ctx.stroke();
  }

  ctx.restore();
}

function drawClassicOvalPreview(ctx, w, h) {
  ctx.clearRect(0, 0, w, h);
  const lw = w * 0.34, lh = h * 0.62;
  ctx.lineWidth = 2;
  ctx.strokeStyle = '#c8a96e';
  for (const cx of [w*0.3, w*0.7]) {
    ctx.beginPath();
    ctx.ellipse(cx, h*0.5, lw*0.5, lh*0.5, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(180,220,255,0.10)';
    ctx.fill();
    ctx.stroke();
  }
  ctx.beginPath();
  ctx.moveTo(w*0.3+lw*0.5, h*0.46);
  ctx.quadraticCurveTo(w*0.5, h*0.62, w*0.7-lw*0.5, h*0.46);
  ctx.stroke();
}

function drawWayfarer(ctx, p) {
  ctx.save();
  ctx.translate(p.cx, p.cy);
  ctx.rotate(p.angle);

  const lw = p.lensW * 0.95;
  const lh = p.lensH * 0.92;
  const r = lw * 0.18;
  const offsetX = p.eyeDist * 0.5 - lw * 0.5;
  const topSlant = lh * 0.12; // wayfarer top is slightly wider

  ctx.lineWidth = Math.max(3, p.faceW * 0.016);
  ctx.strokeStyle = '#1a0c05';
  ctx.lineJoin = 'round';

  for (const side of [-1, 1]) {
    const x = side * (offsetX + lw * 0.5);
    const x0 = x - lw * 0.5, x1 = x + lw * 0.5;
    const y0 = -lh * 0.5, y1 = lh * 0.5;
    // Top edge wider than bottom (wayfarer shape)
    ctx.beginPath();
    ctx.moveTo(x0 + r, y0 - (side > 0 ? topSlant : 0));
    ctx.lineTo(x1 - r + (side > 0 ? topSlant : 0), y0 - (side > 0 ? topSlant : 0));
    ctx.quadraticCurveTo(x1 + (side > 0 ? topSlant*0.5 : 0), y0, x1 + (side > 0 ? topSlant*0.5 : 0), y0 + r);
    ctx.lineTo(x1, y1 - r);
    ctx.quadraticCurveTo(x1, y1, x1 - r, y1);
    ctx.lineTo(x0 + r, y1);
    ctx.quadraticCurveTo(x0, y1, x0, y1 - r);
    ctx.lineTo(x0, y0 + r);
    ctx.quadraticCurveTo(x0, y0 - (side < 0 ? topSlant : 0), x0 + r, y0 - (side < 0 ? topSlant : 0));
    ctx.closePath();
    ctx.fillStyle = 'rgba(10,5,2,0.55)';
    ctx.fill();
    ctx.stroke();
  }

  // Bridge
  ctx.lineWidth = Math.max(2.5, p.faceW * 0.013);
  const bx = offsetX;
  ctx.beginPath();
  ctx.moveTo(-(bx), -lh * 0.05);
  ctx.quadraticCurveTo(0, lh * 0.18, bx, -lh * 0.05);
  ctx.stroke();

  // Temples
  const armLen = p.faceW * 0.30;
  for (const side of [-1, 1]) {
    const sx = side * (offsetX + lw);
    const sy = -lh * 0.1;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + side * armLen, sy + p.lensH * 0.12);
    ctx.stroke();
  }

  ctx.restore();
}

function drawWayfarerPreview(ctx, w, h) {
  ctx.clearRect(0, 0, w, h);
  ctx.lineWidth = 2;
  ctx.strokeStyle = '#c8a96e';
  const lw = w*0.34, lh = h*0.70, r = 3;
  for (const cx of [w*0.28, w*0.72]) {
    const x0=cx-lw*0.5, x1=cx+lw*0.5, y0=h*0.15, y1=h*0.85;
    ctx.beginPath();
    ctx.roundRect(x0, y0, lw, lh, r);
    ctx.fillStyle = 'rgba(10,5,2,0.4)';
    ctx.fill(); ctx.stroke();
  }
  ctx.beginPath();
  ctx.moveTo(w*0.28+lw*0.5, h*0.45);
  ctx.quadraticCurveTo(w*0.5, h*0.62, w*0.72-lw*0.5, h*0.45);
  ctx.stroke();
}

function drawCatEye(ctx, p) {
  ctx.save();
  ctx.translate(p.cx, p.cy);
  ctx.rotate(p.angle);

  const lw = p.lensW * 0.95;
  const lh = p.lensH * 0.90;
  const offsetX = p.eyeDist * 0.5 - lw * 0.5;
  const wing = lw * 0.28;

  ctx.lineWidth = Math.max(2.5, p.faceW * 0.013);
  ctx.strokeStyle = '#0d0408';
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';

  for (const side of [-1, 1]) {
    const x = side * (offsetX + lw * 0.5);
    const x0 = x - lw * 0.5, x1 = x + lw * 0.5;
    const y0 = -lh * 0.5, y1 = lh * 0.5;
    const wingX = side > 0 ? x1 + wing : x0 - wing;
    const wingY = y0 - lh * 0.35;

    ctx.beginPath();
    ctx.moveTo(x0 + lw*0.15, y0);
    // top left → top right with wing
    if (side < 0) {
      ctx.lineTo(wingX, wingY);
      ctx.quadraticCurveTo(x1 + lw*0.05, y0, x1, y0 + lh*0.1);
    } else {
      ctx.quadraticCurveTo(x0, y0, x0, y0 + lh*0.1);
      ctx.lineTo(x1 - lw*0.05, y0);
      ctx.lineTo(wingX, wingY);
    }
    // bottom curve
    ctx.moveTo(side < 0 ? wingX : x1);
    ctx.bezierCurveTo(x1, y1 * 0.5, x0, y1 * 0.5, x0 + lw*0.15, y0);

    ctx.fillStyle = 'rgba(80,10,60,0.25)';
    ctx.fill();
    ctx.stroke();

    // Re-draw outline clean
    ctx.beginPath();
    if (side < 0) {
      ctx.moveTo(wingX, wingY);
      ctx.lineTo(x1, y0 + lh*0.05);
      ctx.quadraticCurveTo(x1 + lw*0.05, y1*0.1, x1, y1*0.5);
      ctx.bezierCurveTo(x1, y1, x0, y1, x0, y1*0.5);
      ctx.bezierCurveTo(x0, y0+lh*0.05, x0+lw*0.1, y0, wingX, wingY);
    } else {
      ctx.moveTo(wingX, wingY);
      ctx.lineTo(x0, y0 + lh*0.05);
      ctx.quadraticCurveTo(x0 - lw*0.05, y1*0.1, x0, y1*0.5);
      ctx.bezierCurveTo(x0, y1, x1, y1, x1, y1*0.5);
      ctx.bezierCurveTo(x1, y0+lh*0.05, x1-lw*0.1, y0, wingX, wingY);
    }
    ctx.closePath();
    ctx.fillStyle = 'rgba(80,10,60,0.22)';
    ctx.fill();
    ctx.stroke();
  }

  // Bridge
  ctx.lineWidth = Math.max(2, p.faceW * 0.011);
  const bx = offsetX;
  ctx.beginPath();
  ctx.moveTo(-(bx), -lh * 0.05);
  ctx.quadraticCurveTo(0, lh * 0.20, bx, -lh * 0.05);
  ctx.stroke();

  // Temples
  const armLen = p.faceW * 0.30;
  for (const side of [-1, 1]) {
    const sx = side * (offsetX + lw) + (side < 0 ? -wing : wing);
    const sy = -lh * 0.5 - lh * 0.35;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + side * armLen, sy + p.lensH * 0.28);
    ctx.stroke();
  }

  ctx.restore();
}

function drawCatEyePreview(ctx, w, h) {
  ctx.clearRect(0, 0, w, h);
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = '#c8a96e';
  for (const [cx, side] of [[w*0.28, -1],[w*0.72, 1]]) {
    const lw=w*0.30, lh=h*0.60;
    const x0=cx-lw*0.5, x1=cx+lw*0.5;
    const y0=h*0.25, y1=h*0.85;
    const wX = side>0 ? x1+lw*0.22 : x0-lw*0.22;
    ctx.beginPath();
    ctx.moveTo(wX, y0-lh*0.2);
    ctx.lineTo(side>0?x0:x1, y0+lh*0.1);
    ctx.bezierCurveTo(side>0?x0:x1,y1,side>0?x1:x0,y1,side>0?x1:x0,y0+lh*0.1);
    ctx.lineTo(wX, y0-lh*0.2);
    ctx.fillStyle = 'rgba(80,10,60,0.3)';
    ctx.fill(); ctx.stroke();
  }
}

function drawRoundThin(ctx, p) {
  ctx.save();
  ctx.translate(p.cx, p.cy);
  ctx.rotate(p.angle);

  const lw = p.lensW * 0.86;
  const lh = lw; // perfect circle
  const offsetX = p.eyeDist * 0.5 - lw * 0.5;

  ctx.lineWidth = Math.max(1.5, p.faceW * 0.008);
  ctx.strokeStyle = '#b8860b';

  for (const side of [-1, 1]) {
    const x = side * (offsetX + lw * 0.5);
    ctx.beginPath();
    ctx.arc(x, 0, lw * 0.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200,210,180,0.10)';
    ctx.fill();
    ctx.stroke();
  }

  // Double-bar bridge (round/wire style)
  ctx.lineWidth = Math.max(1.5, p.faceW * 0.007);
  const bx = offsetX;
  for (const dy of [-lh*0.08, lh*0.08]) {
    ctx.beginPath();
    ctx.moveTo(-bx + lw*0.5, dy);
    ctx.lineTo(bx - lw*0.5, dy);
    ctx.stroke();
  }

  // Nose pads
  ctx.lineWidth = Math.max(1.5, p.faceW * 0.007);
  for (const side of [-1, 1]) {
    const px = side * (offsetX - lw * 0.35);
    ctx.beginPath();
    ctx.moveTo(px, -lh * 0.08);
    ctx.lineTo(px + side * lw * 0.08, lh * 0.12);
    ctx.stroke();
  }

  // Temples
  const armLen = p.faceW * 0.30;
  for (const side of [-1, 1]) {
    const sx = side * (offsetX + lw);
    ctx.beginPath();
    ctx.moveTo(sx, 0);
    ctx.lineTo(sx + side * armLen, p.lensH * 0.10);
    ctx.stroke();
  }

  ctx.restore();
}

function drawRoundThinPreview(ctx, w, h) {
  ctx.clearRect(0, 0, w, h);
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = '#b8860b';
  const r = Math.min(w*0.22, h*0.42);
  for (const cx of [w*0.31, w*0.69]) {
    ctx.beginPath();
    ctx.arc(cx, h*0.5, r, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(200,210,180,0.08)';
    ctx.fill(); ctx.stroke();
  }
  ctx.beginPath();
  ctx.moveTo(w*0.31+r, h*0.46); ctx.lineTo(w*0.69-r, h*0.46); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(w*0.31+r, h*0.54); ctx.lineTo(w*0.69-r, h*0.54); ctx.stroke();
}

function drawAviator(ctx, p) {
  ctx.save();
  ctx.translate(p.cx, p.cy);
  ctx.rotate(p.angle);

  const lw = p.lensW * 0.92;
  const lhTop = p.lensH * 0.48;
  const lhBot = p.lensH * 0.60;
  const offsetX = p.eyeDist * 0.5 - lw * 0.5;

  ctx.lineWidth = Math.max(2, p.faceW * 0.010);
  ctx.strokeStyle = '#c0a030';

  for (const side of [-1, 1]) {
    const x = side * (offsetX + lw * 0.5);
    // Teardrop: flat top, round-bottom
    ctx.beginPath();
    ctx.moveTo(x - lw*0.5, -lhTop*0.5);
    ctx.lineTo(x + lw*0.5, -lhTop*0.5);
    ctx.bezierCurveTo(
      x + lw*0.5, -lhTop*0.5 + lhBot*0.5,
      x + lw*0.35, lhBot*0.5,
      x, lhBot*0.5
    );
    ctx.bezierCurveTo(
      x - lw*0.35, lhBot*0.5,
      x - lw*0.5, -lhTop*0.5 + lhBot*0.5,
      x - lw*0.5, -lhTop*0.5
    );
    ctx.closePath();
    ctx.fillStyle = 'rgba(210,230,255,0.12)';
    ctx.fill();
    ctx.stroke();
  }

  // Bridge — thin bar style
  ctx.lineWidth = Math.max(1.5, p.faceW * 0.008);
  const bx = offsetX;
  ctx.beginPath();
  ctx.moveTo(-bx + lw*0.5, -lhTop*0.5);
  ctx.lineTo(bx - lw*0.5, -lhTop*0.5);
  ctx.stroke();

  // Nose pads (aviator style)
  for (const side of [-1, 1]) {
    const px = side * (offsetX - lw * 0.3);
    ctx.beginPath();
    ctx.moveTo(px, -lhTop*0.5);
    ctx.bezierCurveTo(px, 0, px + side * lw*0.12, lhTop*0.1, px + side*lw*0.15, lhTop*0.3);
    ctx.stroke();
  }

  // Temples
  const armLen = p.faceW * 0.32;
  for (const side of [-1, 1]) {
    const sx = side * (offsetX + lw);
    const sy = -lhTop * 0.5;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + side * armLen * 0.7, sy);
    ctx.lineTo(sx + side * armLen, sy + p.lensH * 0.15);
    ctx.stroke();
  }

  ctx.restore();
}

function drawAviatorPreview(ctx, w, h) {
  ctx.clearRect(0, 0, w, h);
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = '#c0a030';
  const lw=w*0.34, y0=h*0.18, y1=h*0.88;
  for (const cx of [w*0.28, w*0.72]) {
    ctx.beginPath();
    ctx.moveTo(cx-lw*0.5, y0); ctx.lineTo(cx+lw*0.5, y0);
    ctx.bezierCurveTo(cx+lw*0.5,(y0+y1)*0.5,cx+lw*0.35,y1,cx,y1);
    ctx.bezierCurveTo(cx-lw*0.35,y1,cx-lw*0.5,(y0+y1)*0.5,cx-lw*0.5,y0);
    ctx.closePath();
    ctx.fillStyle = 'rgba(210,230,255,0.10)';
    ctx.fill(); ctx.stroke();
  }
  ctx.beginPath();
  ctx.moveTo(w*0.28+lw*0.5,y0); ctx.lineTo(w*0.72-lw*0.5,y0); ctx.stroke();
}

// ══════════════════════════════════════════════════════════════════
//  MEDIAPIPE LANDMARK INDICES (Face Mesh 468 point model)
// ══════════════════════════════════════════════════════════════════
const LM = {
  // Left eye (from camera's POV = user's right eye)
  LEFT_EYE_INNER:  133,
  LEFT_EYE_OUTER:  33,
  LEFT_EYE_TOP:    159,
  LEFT_EYE_BOT:    145,
  LEFT_PUPIL:      468, // only in refine mode

  // Right eye (from camera's POV = user's left eye)
  RIGHT_EYE_INNER: 362,
  RIGHT_EYE_OUTER: 263,
  RIGHT_EYE_TOP:   386,
  RIGHT_EYE_BOT:   374,
  RIGHT_PUPIL:     473,

  // Nose
  NOSE_BRIDGE_TOP: 168,
  NOSE_TIP:        1,
  NOSE_BRIDGE_MID: 6,

  // Face edges (for width)
  LEFT_CHEEK:  234,
  RIGHT_CHEEK: 454,

  // Chin and forehead (for height)
  CHIN:       152,
  FOREHEAD:   10,
};

// ══════════════════════════════════════════════════════════════════
//  APPLICATION STATE
// ══════════════════════════════════════════════════════════════════
const state = {
  faceMesh: null,
  camera: null,
  activeFrameIdx: 0,
  showDebug: false,
  faceShape: null,
  lastLandmarks: null,
  smoothedParams: null,
  modelLoaded: false,
};

// Exponential moving average for smooth tracking
const SMOOTHING = 0.65;
function smooth(prev, next) {
  if (!prev) return next;
  const s = {};
  for (const k in next) {
    s[k] = prev[k] * SMOOTHING + next[k] * (1 - SMOOTHING);
  }
  return s;
}

// ══════════════════════════════════════════════════════════════════
//  FACE SHAPE ANALYSIS
// ══════════════════════════════════════════════════════════════════
function analyzeFaceShape(landmarks, canvasW, canvasH) {
  const lm = (idx) => ({
    x: landmarks[idx].x * canvasW,
    y: landmarks[idx].y * canvasH,
  });

  const faceW = dist(lm(LM.LEFT_CHEEK), lm(LM.RIGHT_CHEEK));
  const faceH = dist(lm(LM.FOREHEAD), lm(LM.CHIN));
  const jawW = dist(lm(234), lm(454)) * 0.85; // approximation
  const foreheadW = dist(lm(103), lm(332));
  const ratio = faceH > 0 ? faceW / faceH : 1;

  let shape, tip, recommended;

  if (ratio > 0.88) {
    // Wide
    shape = 'Round';
    tip = 'Your face is wider — angular frames add definition.';
    recommended = 'Wayfarer · Rectangle · Cat Eye';
  } else if (ratio < 0.68) {
    // Tall / narrow
    shape = 'Oblong';
    tip = 'Tall face — wide frames add balance.';
    recommended = 'Aviator · Oversized · Cat Eye';
  } else {
    // Mid ratio
    const jawRatio = foreheadW > 0 ? jawW / foreheadW : 1;
    if (jawRatio > 1.05) {
      shape = 'Pear';
      tip = 'Wider jaw — lightweight or rimless top frames work well.';
      recommended = 'Round · Oval · Rimless';
    } else if (jawRatio < 0.82) {
      shape = 'Heart';
      tip = 'Wider forehead — bottom-heavy frames balance your features.';
      recommended = 'Aviator · Round · Oval';
    } else {
      shape = 'Oval';
      tip = 'Balanced proportions — most frame styles suit you.';
      recommended = 'All styles work — try them all!';
    }
  }

  return { shape, tip, recommended };
}

function dist(a, b) {
  return Math.hypot(b.x - a.x, b.y - a.y);
}

// ══════════════════════════════════════════════════════════════════
//  EXTRACT FRAME OVERLAY PARAMS FROM LANDMARKS
// ══════════════════════════════════════════════════════════════════
function extractParams(landmarks, W, H) {
  const lm = (idx) => ({
    x: (1 - landmarks[idx].x) * W, // mirror X
    y: landmarks[idx].y * H,
  });

  // Eye centers
  const leftEyeCenter = midpoint(lm(LM.LEFT_EYE_INNER), lm(LM.LEFT_EYE_OUTER));
  const rightEyeCenter = midpoint(lm(LM.RIGHT_EYE_INNER), lm(LM.RIGHT_EYE_OUTER));

  // Midpoint between eyes
  const cx = (leftEyeCenter.x + rightEyeCenter.x) / 2;
  const cy = (leftEyeCenter.y + rightEyeCenter.y) / 2;

  // Eye distance
  const eyeDist = dist(leftEyeCenter, rightEyeCenter);

  // Face width
  const faceW = dist(
    { x: (1 - landmarks[LM.LEFT_CHEEK].x) * W, y: landmarks[LM.LEFT_CHEEK].y * H },
    { x: (1 - landmarks[LM.RIGHT_CHEEK].x) * W, y: landmarks[LM.RIGHT_CHEEK].y * H }
  );

  // Tilt angle
  const angle = Math.atan2(
    rightEyeCenter.y - leftEyeCenter.y,
    rightEyeCenter.x - leftEyeCenter.x
  );

  // Nose bridge Y position
  const noseBridge = {
    x: (1 - landmarks[LM.NOSE_BRIDGE_TOP].x) * W,
    y: landmarks[LM.NOSE_BRIDGE_TOP].y * H,
  };

  // Lens sizing relative to eye distance
  const lensW = eyeDist * 1.05;
  const lensH = lensW * 0.58;

  // Vertical offset: frames sit just above eyes at nose bridge height
  const vertOffset = (noseBridge.y - cy) * 0.18;

  return { cx, cy: cy + vertOffset, eyeDist, faceW, angle, lensW, lensH, noseBridge };
}

function midpoint(a, b) {
  return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
}

// ══════════════════════════════════════════════════════════════════
//  CANVAS RENDERING
// ══════════════════════════════════════════════════════════════════
const video = document.getElementById('inputVideo');
const canvas = document.getElementById('outputCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const vp = document.getElementById('viewport');
  canvas.width = vp.offsetWidth;
  canvas.height = vp.offsetHeight;
}

function renderFrame(results) {
  const W = canvas.width, H = canvas.height;

  ctx.clearRect(0, 0, W, H);

  // Draw mirrored video
  ctx.save();
  ctx.scale(-1, 1);
  ctx.drawImage(results.image, -W, 0, W, H);
  ctx.restore();

  if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
    setStatus('detecting', 'Searching for face…');
    hideRecommendation();
    state.smoothedParams = null;
    return;
  }

  const landmarks = results.multiFaceLandmarks[0];
  state.lastLandmarks = landmarks;

  // Extract & smooth params
  const raw = extractParams(landmarks, W, H);
  state.smoothedParams = smooth(state.smoothedParams, raw);
  const p = state.smoothedParams;

  setStatus('tracked', 'Face tracked');

  // Draw debug landmarks
  if (state.showDebug) drawDebugPoints(landmarks, W, H);

  // Draw frame overlay
  const frame = FRAMES[state.activeFrameIdx];
  frame.draw(ctx, p);

  // Analyze face shape (throttled)
  if (!state.faceShape || Math.random() < 0.03) {
    state.faceShape = analyzeFaceShape(landmarks, W, H);
    showRecommendation(state.faceShape);
  }
}

function drawDebugPoints(landmarks, W, H) {
  const keyPoints = [
    LM.LEFT_EYE_INNER, LM.LEFT_EYE_OUTER, LM.RIGHT_EYE_INNER, LM.RIGHT_EYE_OUTER,
    LM.NOSE_BRIDGE_TOP, LM.LEFT_CHEEK, LM.RIGHT_CHEEK, LM.CHIN, LM.FOREHEAD,
    LM.LEFT_EYE_TOP, LM.LEFT_EYE_BOT, LM.RIGHT_EYE_TOP, LM.RIGHT_EYE_BOT,
  ];
  ctx.fillStyle = 'rgba(200,169,110,0.9)';
  for (const idx of keyPoints) {
    const lm = landmarks[idx];
    ctx.beginPath();
    ctx.arc((1 - lm.x) * W, lm.y * H, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ══════════════════════════════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════════════════════════════
function setStatus(type, text) {
  const badge = document.getElementById('statusBadge');
  const textEl = document.getElementById('statusText');
  badge.className = type;
  textEl.textContent = text;
}

function showRecommendation(data) {
  const panel = document.getElementById('recommendationPanel');
  document.getElementById('recShape').textContent = data.shape + ' Face';
  document.getElementById('recFrames').textContent = data.recommended;
  panel.classList.add('visible');
}

function hideRecommendation() {
  document.getElementById('recommendationPanel').classList.remove('visible');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ══════════════════════════════════════════════════════════════════
//  CAPTURE / SCREENSHOT
// ══════════════════════════════════════════════════════════════════
function capturePhoto() {
  // Render current state to a temporary canvas for download
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = canvas.width;
  tmpCanvas.height = canvas.height;
  const tmpCtx = tmpCanvas.getContext('2d');
  tmpCtx.drawImage(canvas, 0, 0);

  tmpCanvas.toBlob((blob) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `tryon-${Date.now()}.jpg`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('📸 Photo saved!');
  }, 'image/jpeg', 0.92);
}

// ══════════════════════════════════════════════════════════════════
//  FRAME SELECTOR UI
// ══════════════════════════════════════════════════════════════════
function buildFrameSelector() {
  const container = document.getElementById('frameSelector');
  FRAMES.forEach((frame, idx) => {
    const btn = document.createElement('button');
    btn.className = 'frame-btn' + (idx === 0 ? ' active' : '');
    btn.setAttribute('data-idx', idx);

    const previewCanvas = document.createElement('canvas');
    previewCanvas.width = 56;
    previewCanvas.height = 22;
    const pCtx = previewCanvas.getContext('2d');
    frame.preview(pCtx, 56, 22);

    const label = document.createElement('span');
    label.textContent = frame.name;

    btn.appendChild(previewCanvas);
    btn.appendChild(label);

    btn.addEventListener('click', () => selectFrame(idx));
    container.appendChild(btn);
  });
}

function selectFrame(idx) {
  state.activeFrameIdx = idx;
  state.smoothedParams = null; // reset smoothing to avoid jump artifacts
  document.querySelectorAll('.frame-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });
  showToast(`${FRAMES[idx].name} · ${FRAMES[idx].subtitle}`);
}

function toggleDebug() {
  state.showDebug = !state.showDebug;
  document.getElementById('toggleLandmarks').classList.toggle('active', state.showDebug);
  showToast(state.showDebug ? 'Landmarks ON' : 'Landmarks OFF');
}

// ══════════════════════════════════════════════════════════════════
//  MEDIAPIPE INITIALIZATION
// ══════════════════════════════════════════════════════════════════
async function initFaceMesh() {
  setStatus('detecting', 'Loading model…');

  const faceMesh = new FaceMesh({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`,
  });

  faceMesh.setOptions({
    maxNumFaces: 1,
    refineLandmarks: true,          // enables iris landmarks (468, 473)
    minDetectionConfidence: 0.55,
    minTrackingConfidence: 0.50,
  });

  faceMesh.onResults(renderFrame);

  state.faceMesh = faceMesh;

  // Warm up the model
  await faceMesh.initialize();
  state.modelLoaded = true;

  document.getElementById('loadingOverlay').classList.add('hidden');
  setStatus('detecting', 'Searching for face…');
}

// ══════════════════════════════════════════════════════════════════
//  CAMERA INITIALIZATION
// ══════════════════════════════════════════════════════════════════
async function initCamera() {
  const constraints = {
    video: {
      facingMode: 'user',         // front camera
      width: { ideal: 1280 },
      height: { ideal: 720 },
      frameRate: { ideal: 30, max: 60 },
    },
    audio: false,
  };

  try {
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
    await new Promise((resolve) => { video.onloadedmetadata = resolve; });
    await video.play();

    // Use MediaPipe Camera utility for proper frame pumping
    const mpCamera = new Camera(video, {
      onFrame: async () => {
        if (state.faceMesh && state.modelLoaded) {
          await state.faceMesh.send({ image: video });
        }
      },
      width: 1280,
      height: 720,
    });

    await mpCamera.start();
    state.camera = mpCamera;

  } catch (err) {
    console.error('Camera error:', err);
    setStatus('error', 'Camera blocked');
    document.getElementById('loadingOverlay').classList.add('hidden');

    const msg = err.name === 'NotAllowedError'
      ? '❌ Camera permission denied.\n\nOn iPhone: Settings → Safari → Camera → Allow\nOn Android: tap the lock icon in the address bar.'
      : `❌ Camera error: ${err.message}`;

    alert(msg);
  }
}

// ══════════════════════════════════════════════════════════════════
//  BOOTSTRAP
// ══════════════════════════════════════════════════════════════════
async function startApp() {
  document.getElementById('permScreen').classList.add('hidden');
  document.getElementById('loadingOverlay').classList.remove('hidden');

  resizeCanvas();
  window.addEventListener('resize', () => {
    resizeCanvas();
    state.smoothedParams = null;
  });

  buildFrameSelector();

  try {
    // Start both in parallel — camera can warm up while model loads
    await Promise.all([initFaceMesh(), initCamera()]);
  } catch (err) {
    console.error('Init error:', err);
    setStatus('error', 'Init failed');
  }
}

// Auto-start if browser already has permissions (skip the permission screen)
// Comment this out if you want the manual tap to start
window.addEventListener('load', async () => {
  // Check if getUserMedia is available
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    document.getElementById('permScreen').querySelector('p').textContent =
      'Camera API not supported. Please use Chrome or Safari on a modern device.';
    return;
  }
  // On mobile we need user gesture to start camera; show permission screen
  // On desktop we can try to auto-start
  const isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);
  if (!isMobile) {
    // Auto-start on desktop for faster dev testing
    // startApp();
  }
});
